# Publish packages/cursor-kit to the public npm registry.
#
# Maintainer flow: bump version in packages/cursor-kit/package.json, commit,
# tag as cursor-kit-vX.Y.Z, push the tag. See packages/cursor-kit/README.md.

name: Publish cursor-kit to npm

on:
  push:
    tags:
      - "cursor-kit-v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        run: |
          set -euo pipefail
          ref="${GITHUB_REF#refs/tags/cursor-kit-v}"
          ver=$(node -p "require('./packages/cursor-kit/package.json').version")
          if [ "$ref" != "$ver" ]; then
            echo "Tag suffix cursor-kit-v${ref} must equal packages/cursor-kit version ${ver}"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build cursor-kit
        run: npm run build -w cursor-kit

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish -w cursor-kit
